<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金PE估值分析报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #94a3b8;
            font-size: 1em;
        }
        .latest-badge {
            display: inline-block;
            background: linear-gradient(90deg, #10b981, #059669);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 8px;
            vertical-align: middle;
        }
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .report-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
        }
        .report-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .report-card.is-latest {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.08);
        }
        .report-card.is-latest:hover {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.7);
        }
        .report-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .report-date-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            flex-shrink: 0;
        }
        .report-date-icon .day {
            font-size: 1.2em;
            line-height: 1;
        }
        .report-date-icon .month {
            font-size: 0.6em;
            opacity: 0.8;
            line-height: 1;
        }
        .report-meta h3 {
            font-size: 1.1em;
            font-weight: 600;
        }
        .report-meta p {
            font-size: 0.85em;
            color: #94a3b8;
            margin-top: 2px;
        }
        .arrow {
            font-size: 1.2em;
            color: #64748b;
            transition: transform 0.2s;
        }
        .report-card:hover .arrow {
            transform: translateX(4px);
            color: #60a5fa;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #475569;
            font-size: 0.85em;
        }
        .auto-note {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 30px;
            font-size: 0.9em;
            color: #94a3b8;
            line-height: 1.6;
        }
        .auto-note span {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基金PE估值分析报告</h1>
            <p>沪深300 · 创业板指 · 中证500 · 标普500</p>
        </div>

        <div class="auto-note">
            📅 每个交易日自动更新 · 点击查看对应日期的完整报告<br>
            报告数据来源：<span>neodata + etf.run + akshare</span>
        </div>

        <div class="report-list" id="reportList">
            <!-- 动态生成 -->
        </div>

        <div class="footer">
            <p>由 GX-大管家 自动生成 · GitHub Pages 托管</p>
        </div>
    </div>

    <script>
        // 报告列表（从新到旧）
        const reports = [
            { date: '20260427', label: '2026年4月27日（周一）', weekday: '周一' },
            { date: '20260426', label: '2026年4月26日（周日）', weekday: '周日' },
        ];

        const listEl = document.getElementById('reportList');

        reports.forEach((r, i) => {
            const isLatest = i === 0;
            const day = r.date.slice(6, 8);
            const month = r.date.slice(4, 6);

            const card = document.createElement('a');
            card.href = `report_${r.date}.html`;
            card.className = `report-card${isLatest ? ' is-latest' : ''}`;
            card.innerHTML = `
                <div class="report-info">
                    <div class="report-date-icon">
                        <span class="day">${day}</span>
                        <span class="month">${month}月</span>
                    </div>
                    <div class="report-meta">
                        <h3>${r.label}${isLatest ? '<span class="latest-badge">最新</span>' : ''}</h3>
                        <p>沪深300/创业板/中证500 PE估值分析 · 4只基金净值走势</p>
                    </div>
                </div>
                <span class="arrow">→</span>
            `;
            listEl.appendChild(card);
        });
    </script>
</body>
</html>
